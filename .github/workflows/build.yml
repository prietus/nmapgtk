name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Compilación nativa en cada arquitectura (sin cross-compilación):
          # así pkg-config encuentra las librerías GTK4/libadwaita de cada arch.
          - { runner: ubuntu-24.04, arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: arm64 }

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libgtk-4-dev libadwaita-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/release/nmapgtk "dist/nmapgtk-linux-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: nmapgtk-linux-${{ matrix.arch }}
          path: dist/nmapgtk-linux-${{ matrix.arch }}
          if-no-files-found: error

  # Al empujar una etiqueta vX.Y.Z, publica los binarios en una Release.
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
